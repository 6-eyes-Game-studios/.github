name: Organization Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: 6-eyes-game-studios
          base: "activity"
          plugin_activity: yes
          plugin_activity_days: 30
          plugin_activity_limit: 10
          plugin_activity_filter: issue,pr,release,fork,review,commit
          plugin_activity_timestamps: yes
          plugin_activity_topics: yes
          filename: activity-graph.svg
          output_action: inline
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add activity-graph.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "Update organization activity graph"
          git push
