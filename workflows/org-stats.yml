name: Organization Activity Graph

on:
  schedule:
    - cron: '0 0 * * *'  # каждый день в 00:00 UTC
  workflow_dispatch:      # возможность запустить вручную

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install requests matplotlib pandas numpy
        
    - name: Generate activity graph
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python - <<EOF
        import requests, matplotlib.pyplot as plt, pandas as pd
        from datetime import datetime, timedelta
        from collections import defaultdict
        
        org = "6-eyes-Game-studios"
        headers = {}
        token = __import__('os').environ.get('GITHUB_TOKEN')
        if token:
            headers["Authorization"] = f"token {token}"
        
        # Получаем все репозитории организации
        repos = []
        page = 1
        while True:
            resp = requests.get(f"https://api.github.com/orgs/{org}/repos?per_page=100&page={page}", headers=headers)
            if resp.status_code != 200:
                break
            batch = resp.json()
            if not batch:
                break
            repos.extend(batch)
            page += 1
        
        print(f"Найдено {len(repos)} репозиториев")
        
        # Собираем события за последние 30 дней
        end_date = datetime.now()
        start_date = end_date - timedelta(days=30)
        date_range = [start_date + timedelta(days=i) for i in range(31)]
        daily_counts = {d.date(): 0 for d in date_range}
        
        # Собираем коммиты и события
        for repo in repos:
            repo_name = repo['name']
            # Получаем коммиты за последние 30 дней
            since = start_date.isoformat()
            commits_url = f"https://api.github.com/repos/{org}/{repo_name}/commits?since={since}&per_page=100"
            try:
                resp = requests.get(commits_url, headers=headers)
                if resp.status_code == 200:
                    commits = resp.json()
                    for commit in commits:
                        if 'commit' in commit and 'author' in commit['commit']:
                            date_str = commit['commit']['author'].get('date')
                            if date_str:
                                commit_date = datetime.strptime(date_str[:10], '%Y-%m-%d').date()
                                if commit_date in daily_counts:
                                    daily_counts[commit_date] += 1
            except Exception as e:
                print(f"Ошибка при получении коммитов {repo_name}: {e}")
        
        # Строим красивый график
        dates = sorted(daily_counts.keys())
        values = [daily_counts[d] for d in dates]
        
        # Настройка стиля для тёмной темы
        plt.style.use('dark_background')
        fig, ax = plt.subplots(figsize=(14, 5), facecolor='#0d1117')
        ax.set_facecolor('#0d1117')
        
        # Линия с точками в стиле вашего примера
        ax.plot(dates, values, 
                marker='o',           # круглые точки
                markersize=6,         # размер точек
                markerfacecolor='#FF4500',  # оранжевые точки
                markeredgecolor='#FF4500',
                color='#8A2BE2',      # фиолетовая линия
                linewidth=2.5,        # толщина линии
                linestyle='-',
                alpha=0.9,
                label='Активность')
        
        # Заливка под графиком (area)
        ax.fill_between(dates, values, 
                        alpha=0.25, 
                        color='#8A2BE2',
                        label='_nolegend_')
        
        # Настройка сетки
        ax.grid(True, alpha=0.2, linestyle='--', linewidth=0.8, color='#c9d1d9')
        
        # Настройка осей
        ax.set_title(f'Активность организации {org}\nза последние 30 дней', 
                     color='#c9d1d9', 
                     fontsize=14, 
                     pad=20,
                     fontweight='bold')
        ax.set_xlabel('Дата', color='#8b949e', fontsize=11)
        ax.set_ylabel('Количество событий', color='#8b949e', fontsize=11)
        
        # Форматирование оси X
        plt.xticks(rotation=45, ha='right', color='#c9d1d9')
        plt.yticks(color='#c9d1d9')
        
        # Скрываем верхнюю и правую границы
        ax.spines['top'].set_visible(False)
        ax.spines['right'].set_visible(False)
        ax.spines['bottom'].set_color('#30363d')
        ax.spines['left'].set_color('#30363d')
        
        # Добавляем сетку только по Y
        ax.grid(axis='y', alpha=0.3, linestyle='--', linewidth=0.5)
        
        # Добавляем подписи значений над точками (опционально)
        for i, (date, val) in enumerate(zip(dates, values)):
            if val > 0:
                ax.annotate(str(val), 
                           xy=(date, val), 
                           xytext=(0, 10), 
                           textcoords='offset points',
                           ha='center', 
                           fontsize=8, 
                           color='#c9d1d9',
                           alpha=0.7)
        
        plt.tight_layout()
        plt.savefig('activity-graph.svg', 
                   facecolor='#0d1117', 
                   edgecolor='none',
                   bbox_inches='tight',
                   dpi=150)
        plt.savefig('activity-graph.png', 
                   facecolor='#0d1117', 
                   edgecolor='none',
                   bbox_inches='tight',
                   dpi=150)
        print("✅ График успешно создан!")
        EOF
        
    - name: Commit and push graph
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add activity-graph.svg activity-graph.png
        git diff --quiet && git diff --staged --quiet || git commit -m "Обновление графика активности организации $(date +'%Y-%m-%d')"
        git push
